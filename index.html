<style>
:root {
  --font-body: 'Satoshi', Inter, sans-serif;
  --color-bg-dark: #0d0d0f;
  --color-surface-dark: #141416;
  --color-border-dark: rgba(255,255,255,0.08);
  --color-text-dark: #e8e6e0;
  --color-muted-dark: #8a8880;
  --color-primary: #2ec4b6;
  --color-primary-glow: rgba(46,196,182,0.18);
  --color-bg-light: #f5f4f0;
  --color-surface-light: #ffffff;
  --color-border-light: rgba(0,0,0,0.08);
  --color-text-light: #1a1917;
  --color-muted-light: #6b6966;
  --radius-full: 9999px;
  --radius-lg: 0.875rem;
  --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
  --transition: 180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"] {
  --bg: var(--color-bg-dark);
  --surface: var(--color-surface-dark);
  --border: var(--color-border-dark);
  --text: var(--color-text-dark);
  --muted: var(--color-muted-dark);
}
[data-theme="light"] {
  --bg: var(--color-bg-light);
  --surface: var(--color-surface-light);
  --border: var(--color-border-light);
  --text: var(--color-text-light);
  --muted: var(--color-muted-light);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  transition:background var(--transition),color var(--transition);
}
canvas{display:block}

/* Header */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:4rem;
  background:color-mix(in oklab,var(--bg) 80%,transparent);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:0.6rem;text-decoration:none;color:var(--text)}
.brand svg{color:var(--color-primary)}
.brand-name{font-size:0.9rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:0.5rem}
.btn-icon{
  width:2.75rem;height:2.75rem;border-radius:var(--radius-full);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);cursor:pointer;
  display:grid;place-items:center;
  transition:background var(--transition),border-color var(--transition);
}
.btn-icon:hover{background:color-mix(in oklab,var(--surface) 85%,var(--text))}
.btn-pill{
  height:2.75rem;padding:0 1.1rem;border-radius:var(--radius-full);
  background:var(--color-primary);color:#0d0d0f;
  border:none;cursor:pointer;font-family:var(--font-body);
  font-size:0.85rem;font-weight:700;letter-spacing:0.04em;
  transition:opacity var(--transition),transform var(--transition);
}
.btn-pill:hover{opacity:0.88;transform:translateY(-1px)}

/* Globe container */
#globe-wrap{
  position:fixed;inset:0;top:4rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#canvas-globe{cursor:grab;touch-action:none}
#canvas-globe:active{cursor:grabbing}

/* Hero text */
.hero-text{
  position:absolute;top:1.5rem;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;white-space:nowrap;
}
.hero-text h1{
  font-size:clamp(1.4rem,3vw,2.2rem);font-weight:700;
  letter-spacing:-0.03em;line-height:1.1;
  background:linear-gradient(135deg,var(--text) 40%,var(--color-primary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-text p{
  margin-top:0.35rem;font-size:clamp(0.8rem,1.5vw,0.95rem);
  color:var(--muted);
}

/* Tooltip */
#tooltip{
  position:fixed;
  pointer-events:none;
  display:none;
  flex-direction:column;
  align-items:center;
  gap:0.3rem;
  z-index:200;
  transform:translate(-50%,-120%);
}
#tooltip.show{display:flex}
.tooltip-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:0.55rem 0.8rem;
  box-shadow:var(--shadow-md);
  display:flex;align-items:center;gap:0.55rem;
  white-space:nowrap;
}
.tooltip-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.tooltip-name{font-size:0.82rem;font-weight:600;color:var(--text)}
.tooltip-cat{font-size:0.72rem;color:var(--muted)}
.tooltip-arrow{
  width:0;height:0;
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:6px solid var(--surface);
}

/* Stats bar */
.stats-bar{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  display:flex;gap:1px;
  background:var(--border);
  border-radius:var(--radius-full);
  overflow:hidden;
  box-shadow:var(--shadow-md);
  z-index:100;
}
.stat-pill{
  padding:0.5rem 1.1rem;
  background:var(--surface);
  display:flex;align-items:center;gap:0.4rem;
  font-size:0.8rem;color:var(--muted);
}
.stat-pill strong{color:var(--text);font-weight:700}

/* Hint */
.drag-hint{
  position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%);
  font-size:0.75rem;color:var(--muted);
  display:flex;align-items:center;gap:0.4rem;
  opacity:1;transition:opacity 1s ease;
  pointer-events:none;
}
.drag-hint.fade{opacity:0}

@media(prefers-reduced-motion:reduce){
  #canvas-globe{animation:none!important}
}
</style>
</head>
<body>

<header class="header">
  <a class="brand" href="#">
    <svg width="28" height="28" viewBox="0 0 48 48" fill="none" aria-label="Aevora logo">
      <circle cx="24" cy="24" r="19" stroke="currentColor" stroke-width="2"/>

<div id="globe-wrap">

    <h1>100 Greatest Brands on Earth</h1>
    <p>Drag to spin · Hover to discover</p>
  </div>
  <canvas id="canvas-globe"></canvas>
</div>

<div id="tooltip">
  <div class="tooltip-card">
    <img class="tooltip-logo" id="tt-logo" src="" alt="" width="22" height="22"/>
    <div>
      <div class="tooltip-name" id="tt-name"></div>
      <div class="tooltip-cat" id="tt-cat"></div>
    </div>
  </div>
  <div class="tooltip-arrow"></div>
</div>

<div class="stats-bar">

</div>

<div class="drag-hint" id="dragHint">

    <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>
  </svg>
  Drag to rotate the globe
</div>

const canvas = document.getElementById('canvas-globe');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,1,0.1,1000);
camera.position.z = 2.6;

function resize(){
  const wrap = document.getElementById('globe-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const pointLight = new THREE.PointLight(0x2ec4b6, 1.2, 10);
pointLight.position.set(3, 3, 3);
scene.add(pointLight);
const backLight = new THREE.PointLight(0xffffff, 0.4, 10);
backLight.position.set(-3,-2,-3);
scene.add(backLight);

const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';

function makeSphere(){
  return new THREE.MeshPhongMaterial({
    color: isDark() ? 0x0e1a2b : 0xdde8f2,
    transparent:true,
    opacity:0.82,
    shininess:60,
  });
}
const sphereMesh = new THREE.Mesh(sphereGeo, makeSphere());
scene.add(sphereMesh);

function makeGrid(){
  const g = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({
    color: isDark() ? 0x1a3050 : 0x9ab8d4,
    transparent:true, opacity:0.35
  });
  for(let lat=-75; lat<=75; lat+=15){
    const r = Math.cos(lat*Math.PI/180);
    const y = Math.sin(lat*Math.PI/180);
    const pts = [];
    for(let i=0;i<=64;i++){
      const a=i/64*Math.PI*2;
      pts.push(new THREE.Vector3(r*Math.cos(a), y, r*Math.sin(a)));
    }
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat.clone()));
  }
  for(let lon=0;lon<180;lon+=15){
    const pts=[];
    for(let i=0;i<=64;i++){
      const a=i/64*Math.PI*2;
      const x=Math.cos(a)*Math.cos(lon*Math.PI/180);
      const y=Math.sin(a);
      const z=Math.cos(a)*Math.sin(lon*Math.PI/180);
      pts.push(new THREE.Vector3(x,y,z));
    }
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat.clone()));
  }
  return g;
}
let gridGroup = makeGrid();
scene.add(gridGroup);

const glowGeo = new THREE.SphereGeometry(1.12, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x2ec4b6,
  transparent:true,
  opacity: isDark()?0.055:0.025,
  side:THREE.BackSide
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

const textureLoader = new THREE.TextureLoader();
const RADIUS = 1.04;
const sprites = [];
const spriteData = [];

function fibonacciSphere(samples, i){
  const phi = Math.acos(1 - 2*(i+0.5)/samples);
  const theta = Math.PI*(1+Math.sqrt(5))*i;
  return new THREE.Vector3(
    Math.sin(phi)*Math.cos(theta),
    Math.cos(phi),
    Math.sin(phi)*Math.sin(theta)
  ).multiplyScalar(RADIUS);
}

BRANDS.forEach((brand, i)=>{
  const pos = fibonacciSphere(BRANDS.length, i);
  const tex = textureLoader.load(`https://cdn.simpleicons.org/${brand.slug}/ffffff`);
  tex.colorSpace = THREE.SRGBColorSpace;

  const discGeo = new THREE.CircleGeometry(0.055, 32);
  const discMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(
      brand.color === '#000' || brand.color === '#111' || brand.color === '#333'
        ? (isDark() ? '#2a2a3a' : '#e0e0e8')
        : brand.color
    ),
    transparent:true,
    opacity:0.9,
    side:THREE.DoubleSide,
    depthWrite:false,
  });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.copy(pos);
  disc.lookAt(disc.position.clone().multiplyScalar(2));
  scene.add(disc);

  const spriteMat = new THREE.SpriteMaterial({
    map:tex,
    transparent:true,
    alphaTest:0.01,
    depthWrite:false,
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(0.07, 0.07, 1);
  sprite.position.copy(pos.clone().multiplyScalar(1.001));
  scene.add(sprite);

  sprites.push(sprite);
  spriteData.push({brand, pos: pos.clone(), disc});
});

const globeGroup = new THREE.Group();
scene.remove(sphereMesh);
scene.remove(gridGroup);
globeGroup.add(sphereMesh);
globeGroup.add(gridGroup);
sprites.forEach(s=>{ scene.remove(s); globeGroup.add(s); });
spriteData.forEach(d=>{ scene.remove(d.disc); globeGroup.add(d.disc); });
scene.add(globeGroup);

let isDragging = false;
let prevMouse = {x:0,y:0};
let velocity = {x:0,y:0};
let autoSpin = true;
let hintFaded = false;

const tooltip = document.getElementById('tooltip');
const ttLogo  = document.getElementById('tt-logo');
const ttName  = document.getElementById('tt-name');
const ttCat   = document.getElementById('tt-cat');
const raycaster = new THREE.Raycaster();
raycaster.params.Sprite = {threshold:0.03};
const mouse2D = new THREE.Vector2();
let hoveredIdx = -1;

function onPointerDown(e){
  isDragging = true;
  autoSpin = false;
  const pt = e.touches ? e.touches[0] : e;
  prevMouse = {x:pt.clientX, y:pt.clientY};
  velocity = {x:0,y:0};
  if(!hintFaded){
    document.getElementById('dragHint').classList.add('fade');
    hintFaded = true;
  }
}

function onPointerMove(e){
  const pt = e.touches ? e.touches[0] : e;
  const rect = canvas.getBoundingClientRect();
  mouse2D.x = ((pt.clientX-rect.left)/rect.width)*2-1;
  mouse2D.y = -((pt.clientY-rect.top)/rect.height)*2+1;

  if(isDragging){
    const dx = pt.clientX - prevMouse.x;
    const dy = pt.clientY - prevMouse.y;
    velocity.x = dy * 0.005;
    velocity.y = dx * 0.005;
    globeGroup.rotation.x += velocity.x;
    globeGroup.rotation.y += velocity.y;
    prevMouse = {x:pt.clientX, y:pt.clientY};
  }
}

function onPointerUp(){ isDragging = false; }

canvas.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, {passive:true});
window.addEventListener('touchmove', onPointerMove, {passive:true});
window.addEventListener('touchend', onPointerUp);

canvas.addEventListener('wheel', (e)=>{
  camera.position.z = Math.max(1.8, Math.min(5, camera.position.z + e.deltaY * 0.003));
}, {passive:true});

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  clock.getDelta();

  if(!isDragging){
    if(autoSpin){
      globeGroup.rotation.y += 0.0015;
    } else {
      velocity.x *= 0.95;
      velocity.y *= 0.95;
      globeGroup.rotation.x += velocity.x;
      globeGroup.rotation.y += velocity.y;
      if(Math.abs(velocity.x)<0.0001 && Math.abs(velocity.y)<0.0001) autoSpin = true;
    }
  }

  raycaster.setFromCamera(mouse2D, camera);
  let found = -1;
  for(let i=0;i<sprites.length;i++){
    const worldPos = sprites[i].getWorldPosition(new THREE.Vector3());
    const dist = raycaster.ray.distanceToPoint(worldPos);
    if(dist < 0.055){
      const toCamera = camera.position.clone().sub(worldPos);
      const normal = worldPos.clone().normalize();
      if(toCamera.dot(normal) > 0){
        found = i;
        break;
      }
    }
  }

  if(found !== hoveredIdx){
    hoveredIdx = found;
    if(found >= 0){
      const bd = spriteData[found];
      const worldPos = sprites[found].getWorldPosition(new THREE.Vector3());
      const projected = worldPos.clone().project(camera);
      const rect = canvas.getBoundingClientRect();
      const sx = (projected.x*0.5+0.5)*rect.width + rect.left;
      const sy = (-projected.y*0.5+0.5)*rect.height + rect.top;
      tooltip.style.left = sx+'px';
      tooltip.style.top  = sy+'px';
      ttLogo.src = `https://cdn.simpleicons.org/${bd.brand.slug}/555555`;
      ttLogo.alt = bd.brand.name;
      ttName.textContent = bd.brand.name;
      ttCat.textContent  = bd.brand.cat;
      tooltip.classList.add('show');
    } else {
      tooltip.classList.remove('show');
    }
  } else if(found >= 0){
    const worldPos = sprites[found].getWorldPosition(new THREE.Vector3());
    const projected = worldPos.clone().project(camera);
    const rect = canvas.getBoundingClientRect();
    const sx = (projected.x*0.5+0.5)*rect.width + rect.left;
    const sy = (-projected.y*0.5+0.5)*rect.height + rect.top;
    tooltip.style.left = sx+'px';
    tooltip.style.top  = sy+'px';
  }

  renderer.render(scene, camera);
}
animate();

const themeBtn = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  sphereMesh.material.color.set(theme==='dark' ? 0x0e1a2b : 0xdde8f2);
  glowMat.opacity = theme==='dark' ? 0.055 : 0.025;
  gridGroup.children.forEach(line=>{
    line.material.color.set(theme==='dark' ? 0x1a3050 : 0x9ab8d4);
  });
  themeIcon.innerHTML = theme==='dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
}

let currentTheme = 'dark';
applyTheme(currentTheme);

themeBtn.addEventListener('click', ()=>{
  currentTheme = currentTheme==='dark' ? 'light' : 'dark';
  applyTheme(currentTheme);
});
</script>
</body>
</html>
